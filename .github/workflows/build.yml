name: Wsendy Multi-App Builder

on:
  workflow_dispatch:
    inputs:
      apk_name:
        description: 'Andika Jina la APK yako (Mfano: NotepadPro)'
        required: true
        default: 'NotepadPro'
      package_id:
        description: 'Weka ID ya kipekee (Mfano: com.wsendy.notepad)'
        required: true
        default: 'com.wsendy.notepad'
      icon_text:
        description: 'Maandishi ya kwenye Icon'
        required: true
        default: 'wsendy edito'
      andika_sms:
        description: 'Je, App hii itatuma/kusoma SMS na Contacts? (andika: yes au no)'
        required: true
        default: 'no'
      fallback_url:
        description: 'Weka Link ya kufunguka kukiwa na Mtandao'
        required: true
        default: 'https://google.com'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kushusha kodi kutoka Repository (Checkout)
      uses: actions/checkout@v4

    # LIMESAHIHISHWA HAPA: Sasa hivi inasoma java-version: '17' kwa usahihi
    - name: Kuweka Java mazingira ya kazi (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Weka na Kusanidi Injini ya Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'

    - name: Badilisha Jina la App, Link na ID ya Kipekee
      run: |
        sed -i "s/JINA_LA_APP/${{ github.event.inputs.apk_name }}/g" app/src/main/res/values/strings.xml
        sed -i "s/applicationId \"com.example.hybridapp\"/applicationId \"${{ github.event.inputs.package_id }}\"/g" app/build.gradle
        sed -i "s|URL_PLACEHOLDER|${{ github.event.inputs.fallback_url }}|g" app/src/main/java/com/example/hybridapp/MainActivity.java

    - name: Kudhibiti Ruhusa na Kodi za SMS (Anti-Block Filter)
      if: ${{ github.event.inputs.andika_sms == 'no' }}
      run: |
        sed -i '/SMS/d' app/src/main/AndroidManifest.xml
        sed -i '/CONTACTS/d' app/src/main/AndroidManifest.xml
        sed -i '/SmsReceiver/d' app/src/main/AndroidManifest.xml
        sed -i '/MmsReceiver/d' app/src/main/AndroidManifest.xml
        sed -i '/HeadlessSmsSendService/d' app/src/main/AndroidManifest.xml
        sed -i '/\/\/ SMS_START/,/\/\/ SMS_END/d' app/src/main/java/com/example/hybridapp/MainActivity.java
        sed -i '//,//d' app/src/main/assets/index.html

    - name: Weka Mipangilio ya AndroidX
      run: |
        echo "android.useAndroidX=true" >> gradle.properties

    - name: Pakua Library ya jsPDF kwa ajili ya PDF Offline Converter
      run: |
        mkdir -p app/src/main/assets
        curl -L -o app/src/main/assets/jspdf.min.js https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js

    - name: Weka Thamani za Kichora Icon (Pillow)
      run: pip install Pillow

    - name: Tengeneza Icon ya App Kiotomatiki
      env:
        PASSED_ICON_TEXT: ${{ github.event.inputs.icon_text }}
      run: |
        mkdir -p app/src/main/res/drawable
        python -c "
        from PIL import Image, ImageDraw, ImageFont
        import os

        img = Image.new('RGB', (512, 512))
        draw = ImageDraw.Draw(img)

        draw.rectangle([0, 0, 512, 170], fill='#FFCC00')   
        draw.rectangle([0, 170, 512, 342], fill='#0066CC') 
        draw.rectangle([0, 342, 512, 512], fill='#CC3333') 

        draw.rectangle([20, 210, 492, 310], fill='#111111')

        try:
            font = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf', 42)
        except:
            font = ImageFont.load_default()

        text = os.environ.get('PASSED_ICON_TEXT', 'free wsendy')
        draw.text((256, 260), text, fill='#FFFFFF', anchor='mm', font=font)
        img.save('app/src/main/res/drawable/ic_launcher.png')
        "

    - name: Tengeneza na Kusaini APK (Build Debug)
      run: gradle assembleDebug

    - name: Pakia APK Iliyokamilika (GitHub Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.apk_name }}-APK
        path: app/build/outputs/apk/debug/app-debug.apk
