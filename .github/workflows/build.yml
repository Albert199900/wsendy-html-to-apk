name: Wsendy Multi-App Builder

on:
  workflow_dispatch:
    inputs:
      apk_name:
        description: 'Andika Jina la APK yako'
        required: true
        default: 'NotepadPro'
      package_id:
        description: 'Weka ID ya kipekee'
        required: true
        default: 'com.wsendy.notepad'
      icon_text:
        description: 'Maandishi ya kwenye Icon'
        required: true
        default: 'wsendy edito'
      andika_sms:
        description: 'Je, App hii itatuma/kusoma SMS na Contacts? (andika: yes au no)'
        required: true
        default: 'no'
      fallback_url:
        description: 'Mchanganyiko wa Link na HTML kutoka kwenye fomu'
        required: true
        default: 'https://google.com'
      user_email:
        description: 'Email ya Mteja'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kushusha kodi kutoka Repository (Checkout)
      uses: actions/checkout@v4

    - name: Kuweka Java mazingira ya kazi (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Kusanidi na Kuunda Injini mpya ya Gradle Wrapper
      run: |
        gradle wrapper --gradle-version 8.7
        chmod +x gradlew

    - name: Tenganisha URL na Extract HTML za Ndani
      run: |
        mkdir -p app/src/main/assets
        
        cat << 'EOF' > mchanganyiko.txt
        ${{ github.event.inputs.fallback_url }}
        EOF
        
        if grep -q "HTML_DATA_START" mchanganyiko.txt; then
          REAL_URL=$(sed 's/HTML_DATA_START.*//' mchanganyiko.txt)
          echo "ONLINE_URL=$REAL_URL" >> $GITHUB_ENV
          
          sed 's/.*HTML_DATA_START//' mchanganyiko.txt | base64 -d > html_project.zip
          unzip -o html_project.zip -d app/src/main/assets/
        else
          echo "ONLINE_URL=${{ github.event.inputs.fallback_url }}" >> $GITHUB_ENV
        fi

    - name: Badilisha Jina la App, Link na ID ya Kipekee
      run: |
        sed -i "s/JINA_LA_APP/${{ github.event.inputs.apk_name }}/g" app/src/main/res/values/strings.xml
        sed -i "s/applicationId \"com.example.hybridapp\"/applicationId \"${{ github.event.inputs.package_id }}\"/g" app/build.gradle
        sed -i "s|URL_PLACEHOLDER|$ONLINE_URL|g" app/src/main/java/com/example/hybridapp/MainActivity.java

    - name: Kudhibiti Ruhusa na Kodi za SMS (Anti-Block Filter)
      if: ${{ github.event.inputs.andika_sms == 'no' }}
      run: |
        cat << 'EOF' > clean_sms.py
        import os

        manifest_path = 'app/src/main/AndroidManifest.xml'
        if os.path.exists(manifest_path):
            with open(manifest_path, 'r', encoding='utf-8') as f:
                lines = f.readlines()
            with open(manifest_path, 'w', encoding='utf-8') as f:
                for line in lines:
                    if not any(x in line for x in ['SMS', 'CONTACTS', 'SmsReceiver', 'MmsReceiver', 'HeadlessSmsSendService']):
                        f.write(line)

        java_path = 'app/src/main/java/com/example/hybridapp/MainActivity.java'
        if os.path.exists(java_path):
            with open(java_path, 'r', encoding='utf-8') as f:
                content = f.read()
            if '// SMS_START' in content and '// SMS_END' in content:
                start_idx = content.find('// SMS_START')
                end_idx = content.find('// SMS_END') + len('// SMS_END')
                content = content[:start_idx] + content[end_idx:]
            with open(java_path, 'w', encoding='utf-8') as f:
                f.write(content)

        html_path = 'app/src/main/assets/index.html'
        if os.path.exists(html_path):
            with open(html_path, 'r', encoding='utf-8') as f:
                content = f.read()
            if 'SMS_TAB_START' in content and 'SMS_TAB_END' in content:
                start_idx = content.find('SMS_TAB_START')
                end_idx = content.find('SMS_TAB_END') + len('SMS_TAB_END')
                content = content[:start_idx] + content[end_idx:]
            with open(html_path, 'w', encoding='utf-8') as f:
                f.write(content)
        EOF
        python3 clean_sms.py

    - name: Weka Thamani za Kichora Icon (Pillow)
      run: pip install Pillow

    - name: Tengeneza Icon ya App Kiotomatiki
      env:
        PASSED_ICON_TEXT: ${{ github.event.inputs.icon_text }}
      run: |
        mkdir -p app/src/main/res/drawable
        python3 -c "
        from PIL import Image, ImageDraw, ImageFont
        import os

        img = Image.new('RGB', (512, 512))
        draw = ImageDraw.Draw(img)

        draw.rectangle([0, 0, 512, 170], fill='#FFCC00')   
        draw.rectangle([0, 170, 512, 342], fill='#0066CC') 
        draw.rectangle([0, 342, 512, 512], fill='#CC3333') 

        draw.rectangle([20, 210, 492, 310], fill='#111111')

        try:
            font = ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf', 42)
        except:
            font = ImageFont.load_default()

        text = os.environ.get('PASSED_ICON_TEXT', 'free wsendy')
        draw.text((256, 260), text, fill='#FFFFFF', anchor='mm', font=font)
        img.save('app/src/main/res/drawable/ic_launcher.png')
        "

    - name: Weka Mipangilio ya AndroidX
      run: echo "android.useAndroidX=true" >> gradle.properties

    - name: Pakia Library ya jsPDF kwa ajili ya PDF Offline Converter
      run: |
        mkdir -p app/src/main/assets
        curl -L -o app/src/main/assets/jspdf.min.js https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js

    - name: Tengeneza na Kusaini APK (Build Debug)
      run: ./gradlew assembleDebug

    # MTAMBO UNATENGENEZA RELEASE SAFHI YA GITHUB KIOTOMATIKI
    - name: Unda GitHub Release na Pakia APK
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v-${{ github.run_id }}"
        name: "Release ya ${{ github.event.inputs.apk_name }}"
        draft: false
        prerelease: false
        files: app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # TUMA EMAIL YENYE DIRECT DOWNLOAD LINK YA APK (BILA ZIP)
    - name: Tuma APK kwa Email ya Mteja
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: APK ya ${{ github.event.inputs.apk_name }} Ipo Tayari!
        to: ${{ github.event.inputs.user_email }}
        from: Wsendy Multi-Builder <${{ secrets.EMAIL_USERNAME }}>
        body: |
          Habari,
          
          Mchakato wa kutengeneza App yako ya "${{ github.event.inputs.apk_name }}" kwa kutumia kodi za HTML na Online URL umekamilika kikamilifu.
          
          Bofya link iliyo chini ili kupakua (Download) faili lako la APK moja kwa moja kwenye simu yako:
          
          👉 https://github.com/${{ github.repository }}/releases/download/v-${{ github.run_id }}/app-debug.apk
          
          Asante kwa kutumia huduma ya WSendy Turbo!
