name: Tengeneza APK

on:
  workflow_dispatch:
    inputs:
      apk_name:
        description: 'Andika Jina la APK yako (Mfano: AppYangu)'
        required: true
        default: 'AppYangu'
      fallback_url:
        description: 'Weka Link ya kufunguka kukiwa na Mtandao'
        required: true
        default: 'https://google.com'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pakua Code (Checkout)
        uses: actions/checkout@v3

      - name: Weka Java (JDK 17)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Weka Gradle
        uses: gradle/gradle-build-action@v2

      - name: Badilisha Jina la App na Link
        run: |
          # Badili jina la App kwenye strings.xml
          sed -i "s/JINA_LA_APP/${{ github.event.inputs.apk_name }}/g" app/src/main/res/values/strings.xml
          
          # Badili Link kwenye MainActivity.java
          sed -i "s|URL_PLACEHOLDER|${{ github.event.inputs.fallback_url }}|g" app/src/main/java/com/example/hybridapp/MainActivity.java

      - name: Tengeneza APK (Build)
        run: gradle assembleDebug

      - name: Pakia APK (Upload Artifact)
        uses: actions/upload-artifact@v3
        with:
          name: ${{ github.event.inputs.apk_name }}-APK
          path: app/build/outputs/apk/debug/app-debug.apk
