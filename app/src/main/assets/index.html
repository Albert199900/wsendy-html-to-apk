<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Rasmi Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; color: #333; padding: 15px; }
        .container { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: 0 auto; }
        .btn-default { width: 100%; background-color: #ff9500; color: white; border: none; padding: 12px; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; color: #444; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; background-color: #f8fafc; }
        textarea { resize: none; height: 80px; }
        .btn-tuma { width: 100%; background-color: #007aff; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        
        /* Sehemu ya Orodha ya Majina */
        .contacts-section { margin-top: 25px; border-top: 2px solid #eee; padding-top: 15px; }
        .contacts-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; color: #1a1a1a; display: flex; justify-content: space-between; }
        .btn-vuta { background: #34c759; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; }
        .contacts-list { max-height: 200px; overflow-y: auto; margin-top: 10px; border: 1px solid #eee; border-radius: 8px; background: #fafafa; }
        .contact-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; flex-direction: column; }
        .contact-item:hover { background: #f0f0f0; }
        .contact-name { font-weight: bold; font-size: 14px; }
        .contact-number { color: #666; font-size: 13px; }
    </style>
</head>
<body>

    <div class="container">
        <button class="btn-default" onclick="wekaDefault()">Set as Default SMS App</button>

        <h2>Tuma Ujumbe (SMS)</h2>
        <br>

        <div class="form-group">
            <label for="namba">Namba ya Simu:</label>
            <input type="tel" id="namba" placeholder="Mfano: 0712345678" required>
        </div>

        <div class="form-group">
            <label for="ujumbe">Ujumbe wako:</label>
            <textarea id="ujumbe" placeholder="Andika ujumbe hapa..." required></textarea>
        </div>

        <button class="btn-tuma" onclick="tumaSmsSasa()">Tuma SMS Moja kwa Moja</button>

        <div class="contacts-section">
            <div class="contacts-title">
                <span>Kitabu cha Majina</span>
                <button class="btn-vuta" onclick="PakiaMajina()">Onyesha Majina</button>
            </div>
            <div class="contacts-list" id="orodha-ya-majina">
                <p style="text-align: center; color: #999; padding: 15px; font-size: 13px;">Gusa "Onyesha Majina" kupakia contacts...</p>
            </div>
        </div>
    </div>

    <script>
        // Amuru Android kuomba kuwa Default App
        function wekaDefault() {
            if (window.Android && window.Android.wekaDefaultSmsApp) {
                window.Android.wekaDefaultSmsApp();
            } else {
                alert("Msaada wa Android haujapatikana.");
            }
        }

        // Tuma ujumbe kupitia SmsManager ya Android
        function tumaSmsSasa() {
            var namba = document.getElementById('namba').value.trim();
            var ujumbe = document.getElementById('ujumbe').value.trim();
            
            if (namba === "" || ujumbe === "") {
                alert("Tafadhali jaza namba na ujumbe!");
                return;
            }

            if (window.Android && window.Android.tumaSmsMojaKwaMoja) {
                window.Android.tumaSmsMojaKwaMoja(namba, ujumbe);
                document.getElementById('ujumbe').value = ""; // Futa ujumbe uliotumwa
            } else {
                alert("Mfumo wa kutuma umeshindwa.");
            }
        }

        // Vuta majina kutoka kwenye simu na yaweke kwenye HTML list
        function PakiaMajina() {
            if (window.Android && window.Android.pataMajinaYaSimu) {
                var jsonString = window.Android.pataMajinaYaSimu();
                var majina = JSON.parse(jsonString);
                var listContainer = document.getElementById('orodha-ya-majina');
                
                if (majina.length === 0) {
                    listContainer.innerHTML = '<p style="text-align:center; padding:15px; color:red;">Hakuna ruhusa au hakuna majina!</p>';
                    return;
                }

                listContainer.innerHTML = ""; // Safisha ujumbe wa mwanzo
                
                majina.forEach(function(contact) {
                    var div = document.createElement('div');
                    div.className = 'contact-item';
                    div.onclick = function() {
                        // Ukigusa jina, namba inaingia kwenye kisanduku cha namba
                        document.getElementById('namba').value = contact.number.replace(/\s+/g, '');
                    };
                    
                    div.innerHTML = '<span class="contact-name">' + contact.name + '</span>' +
                                    '<span class="contact-number">' + contact.number + '</span>';
                    listContainer.appendChild(div);
                });
            } else {
                alert("Imeshindwa kufikia orodha ya majina ya simu.");
            }
        }
    </script>
</body>
</html>
