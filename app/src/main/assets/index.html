<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mbio za Magari 4K - Ngazi (Levels)</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #1e272e, #0f141c);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 2 / 3;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            border-radius: 16px;
            overflow: hidden;
            border: 4px solid rgba(255, 255, 255, 0.1);
        }
        canvas {
            width: 100%;
            height: 100%;
            background: #2c3e50;
            display: block;
        }
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 20, 28, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            display: none;
            backdrop-filter: blur(10px);
            z-index: 20;
        }
        button {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border: none;
            padding: 15px 35px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.4);
            transition: 0.3s ease;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(255, 71, 87, 0.6);
        }
        .scoreText {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 18px;
            font-weight: 800;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            z-index: 10;
            letter-spacing: 1px;
            display: flex;
            gap: 15px;
        }
        .levelHighlight {
            color: #ffa502;
        }
        h1 {
            font-size: 40px;
            background: linear-gradient(45deg, #ff4757, #ffa502);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <!-- Sehemu ya kuonyesha Ngazi na Alama zote kwa pamoja -->
    <div class="scoreText">
        <div>NGAZI: <span id="level" class="levelHighlight">1</span></div>
        <div>|</div>
        <div>ALAMA: <span id="score">0</span></div>
    </div>
    <canvas id="gameCanvas" width="1200" height="1800"></canvas>
    <div id="gameOverScreen">
        <h1>MCHEZO UMEKWISHA</h1>
        <p style="font-size: 22px; margin: 15px 0; color: #ced6e0;">Ngazi Uliyofikia: <span id="finalLevel" style="color: #ffa502; font-weight: bold;">1</span></p>
        <p style="font-size: 22px; margin: 5px 0; color: #ced6e0;">Alama Zako: <span id="finalScore" style="color: #2ed573; font-weight: bold; font-size: 28px;">0</span></p>
        <button onclick="restartGame()">Cheza Tena</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');
    const finalScoreEl = document.getElementById('finalScore');
    const finalLevelEl = document.getElementById('finalLevel');
    const gameOverScreen = document.getElementById('gameOverScreen');

    const player = {
        x: 525,
        y: 1400,
        width: 150,
        height: 260,
        speed: 20,
        color1: '#ff4757',
        color2: '#ff6b81'
    };

    let keys = {};
    let enemies = [];
    let gameSpeed = 14;
    let score = 0;
    let level = 1;
    let isGameOver = false;
    let roadLinesY = 0;
    
    // Kifaa cha kuhesabu muda wa kuonyesha nembo ya LEVEL UP kwenye kioo
    let levelUpTimer = 0;

    window.addEventListener('keydown', (e) => keys[e.key] = true);
    window.addEventListener('keyup', (e) => keys[e.key] = false);

    // Kazi ya kubadilisha rangi za pembeni kulingana na Ngazi (Level Theme)
    function getEnvironmentColor() {
        if (level === 1) return '#05c46b'; // Kijani (Mizunguko ya kawaida)
        if (level === 2) return '#eccc68'; // Jangwa la Dhahabu (Kasi inaongezeka)
        if (level === 3) return '#0575e6'; // Usiku wa Neon / Jiji la Cyberpunk
        return '#706fd3'; // Rangi ya Kichawi / Volkano ya Hatari sana (Level 4+)
    }

    function spawnEnemy() {
        // Kuongeza idadi ya magari yanayotokea kadiri ngazi inavyokuwa juu
        let maxEnemies = level >= 3 ? 5 : 4;
        let spawnRate = 0.02 + (level * 0.005); // Maadui wanatokea haraka zaidi

        if (Math.random() < spawnRate && enemies.length < maxEnemies) {
            const lanes = [130, 390, 650, 910];
            const randomX = lanes[Math.floor(Math.random() * lanes.length)];
            
            if (!enemies.some(e => e.y < 400 && Math.abs(e.x - randomX) < 100)) {
                const hue = Math.random() * 360;
                enemies.push({
                    x: randomX,
                    y: -300,
                    width: 150,
                    height: 260,
                    color1: `hsl(${hue}, 85%, 45%)`,
                    color2: `hsl(${hue}, 85%, 65%)`
                });
            }
        }
    }

    function update() {
        if (isGameOver) return;

        if ((keys['ArrowLeft'] || keys['a'] || keys['A']) && player.x > 110) {
            player.x -= player.speed;
        }
        if ((keys['ArrowRight'] || keys['d'] || keys['D']) && player.x < canvas.width - player.width - 110) {
            player.x += player.speed;
        }

        roadLinesY += gameSpeed;
        if (roadLinesY >= 160) roadLinesY = 0;

        for (let i = enemies.length - 1; i >= 0; i--) {
            enemies[i].y += gameSpeed;

            if (
                player.x < enemies[i].x + enemies[i].width - 15 &&
                player.x + player.width > enemies[i].x + 15 &&
                player.y < enemies[i].y + enemies[i].height - 15 &&
                player.y + player.height > enemies[i].y + 15
            ) {
                endGame();
            }

            if (enemies[i].y > canvas.height) {
                enemies.splice(i, 1);
                score += 10;
                scoreEl.innerText = score;
                
                // MFUMO WA NGAZI: Kila alama 100 mchezaji anapanda ngazi
                let targetLevel = Math.floor(score / 100) + 1;
                if (targetLevel > level) {
                    level = targetLevel;
                    levelEl.innerText = level;
                    gameSpeed += 3.5; // Ongeza kasi ya barabara kwa kasi zaidi
                    player.speed += 1.5; // Ongeza wepesi wa gari la mchezaji pia
                    levelUpTimer = 90; // Washa dhihirisho la maneno kwa sekunde 1.5
                }
            }
        }

        spawnEnemy();
    }

    function drawCar(car, isPlayer = false) {
        ctx.save();
        ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
        ctx.shadowBlur = 20;
        ctx.shadowOffsetY = 15;

        let gradient = ctx.createLinearGradient(car.x, car.y, car.x + car.width, car.y);
        gradient.addColorStop(0, car.color1);
        gradient.addColorStop(0.5, car.color2);
        gradient.addColorStop(1, car.color1);
        
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.roundRect(car.x, car.y, car.width, car.height, 25);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;

        // Kioo
        ctx.fillStyle = '#2c3e50';
        ctx.beginPath();
        ctx.roundRect(car.x + 18, car.y + 50, car.width - 36, 45, 10);
        ctx.fill();

        // Magurudumu
        ctx.fillStyle = '#1e272e';
        ctx.fillRect(car.x - 12, car.y + 40, 12, 50);
        ctx.fillRect(car.x + car.width, car.y + 40, 12, 50);
        ctx.fillRect(car.x - 12, car.y + 170, 12, 50);
        ctx.fillRect(car.x + car.width, car.y + 170, 12, 50);

        // Taa Kuu
        ctx.save();
        ctx.shadowColor = isPlayer ? '#fffa65' : '#ff4d4d';
        ctx.shadowBlur = 30;
        ctx.fillStyle = isPlayer ? '#fff200' : '#ff3838';
        ctx.fillRect(car.x + 15, car.y - 5, 25, 10);
        ctx.fillRect(car.x + car.width - 40, car.y - 5, 25, 10);
        ctx.restore();

        ctx.restore();
    }

    function draw() {
        // 1. Lami
        ctx.fillStyle = '#1e272e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Mazingira ya Pembeni (Inabadilika kulingana na LEVEL)
        ctx.fillStyle = getEnvironmentColor();
        ctx.fillRect(0, 0, 100, canvas.height);
        ctx.fillRect(canvas.width - 100, 0, 100, canvas.height);

        // Kerbs (Kingo za usalama)
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(90, 0, 10, canvas.height);
        ctx.fillRect(canvas.width - 100, 0, 10, canvas.height);

        // 3. Mistari ya Barabara
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        for (let l = 1; l < 4; l++) {
            let lineX = (canvas.width / 4) * l;
            for (let i = -160; i < canvas.height; i += 160) {
                ctx.fillRect(lineX - 4, i + roadLinesY, 8, 80);
            }
        }

        // 4. Magari
        drawCar(player, true);
        enemies.forEach(enemy => drawCar(enemy, false));

        // 5. CHORA LEVEL UP ANIMATION (Kama mchezaji amepanda ngazi punde tu)
        if (levelUpTimer > 0) {
            ctx.save();
            // Inafifia taratibu kulingana na timer
            ctx.fillStyle = `rgba(255, 165, 0, ${levelUpTimer / 90})`;
            ctx.font = 'bold 90px Poppins, sans-serif';
            ctx.textAlign = 'center';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
            ctx.shadowBlur = 15;
            ctx.fillText(`NGAZI YA ${level}!`, canvas.width / 2, canvas.height / 2);
            ctx.restore();
            levelUpTimer--; // Punguza muda
        }
    }

    function gameLoop() {
        update();
        draw();
        if (!isGameOver) {
            requestAnimationFrame(gameLoop);
        }
    }

    function endGame() {
        isGameOver = true;
        finalScoreEl.innerText = score;
        finalLevelEl.innerText = level;
        gameOverScreen.style.display = 'flex';
    }

    function restartGame() {
        isGameOver = false;
        score = 0;
        level = 1;
        gameSpeed = 14;
        player.speed = 20;
        enemies = [];
        player.x = 525;
        levelUpTimer = 0;
        scoreEl.innerText = score;
        levelEl.innerText = level;
        gameOverScreen.style.display = 'none';
        gameLoop();
    }

    gameLoop();
</script>

</body>
    </html>
