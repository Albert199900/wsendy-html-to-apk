<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mbio za Magari 4K - Sauti na Batani za Simu</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #1e272e, #0f141c);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #gameContainer {
            position: relative;
            width: 95%;
            max-width: 420px;
            aspect-ratio: 2 / 3;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            border-radius: 16px;
            overflow: hidden;
            border: 4px solid rgba(255, 255, 255, 0.1);
        }
        canvas {
            width: 100%;
            height: 100%;
            background: #2c3e50;
            display: block;
        }
        /* Mfumo wa Batani za Simu */
        #mobileControls {
            display: flex;
            justify-content: space-between;
            width: 95%;
            max-width: 420px;
            margin-top: 15px;
            gap: 20px;
        }
        .controlBtn {
            flex: 1;
            background: linear-gradient(135deg, #341f97, #5f27cd);
            border: 2px solid rgba(255,255,255,0.2);
            padding: 20px;
            color: white;
            font-size: 30px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            text-align: center;
            touch-action: manipulation; /* Inazuia zoom ya simu wakati wa kugusa haraka */
            transition: background 0.1s;
        }
        .controlBtn:active {
            background: linear-gradient(135deg, #5f27cd, #341f97);
            transform: scale(0.95);
        }
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 20, 28, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            display: none;
            backdrop-filter: blur(10px);
            z-index: 20;
        }
        #startBtn, #restartBtn {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border: none;
            padding: 15px 35px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.4);
        }
        .scoreText {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 16px;
            font-weight: 800;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            z-index: 10;
            display: flex;
            gap: 10px;
        }
        .levelHighlight { color: #ffa502; }
        h1 {
            font-size: 36px;
            background: linear-gradient(45deg, #ff4757, #ffa502);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="scoreText">
        <div>NGAZI: <span id="level" class="levelHighlight">1</span></div>
        <div>|</div>
        <div>ALAMA: <span id="score">0</span></div>
    </div>
    <canvas id="gameCanvas" width="1200" height="1800"></canvas>
    
    <div id="gameOverScreen">
        <h1 id="gameStatusTitle">MBIO ZA MAGARI</h1>
        <p id="gameStatusDesc" style="font-size: 18px; color: #ced6e0; margin: 10px 0; text-align: center;">Gusa kitufe hapa chini kuanza</p>
        <p id="scoreBreakdown" style="font-size: 20px; margin: 10px 0; color: #ced6e0; display: none;">
            Ngazi: <span id="finalLevel" style="color: #ffa502; font-weight: bold;">1</span> | 
            Alama: <span id="finalScore" style="color: #2ed573; font-weight: bold;">0</span>
        </p>
        <button id="startBtn" onclick="restartGame()">Anza Mchezo</button>
    </div>
</div>

<div id="mobileControls">
    <div class="controlBtn" id="leftBtn">◀ KUSHOTO</div>
    <div class="controlBtn" id="rightBtn">KULIA ▶</div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');
    const finalScoreEl = document.getElementById('finalScore');
    const finalLevelEl = document.getElementById('finalLevel');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const gameStatusTitle = document.getElementById('gameStatusTitle');
    const gameStatusDesc = document.getElementById('gameStatusDesc');
    const scoreBreakdown = document.getElementById('scoreBreakdown');
    const startBtn = document.getElementById('startBtn');

    const player = {
        x: 525,
        y: 1400,
        width: 150,
        height: 260,
        speed: 22,
        color1: '#ff4757',
        color2: '#ff6b81'
    };

    let keys = {};
    let enemies = [];
    let gameSpeed = 14;
    let score = 0;
    let level = 1;
    let isGameOver = true; // Unaanza ukiwa umesimama kwanza ili kuruhusu mifumo ya sauti kuwaka
    let roadLinesY = 0;
    let levelUpTimer = 0;

    // MFUMO WA SAUTI (Web Audio API Synthesizer)
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playLevelUpSound() {
        initAudio();
        if (!audioCtx) return;
        
        let now = audioCtx.currentTime;
        // Sauti ya kwanza ya chini, kisha ya juu haraka (Arcade style)
        [440, 554, 659, 880].forEach((freq, index) => {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, now + (index * 0.08));
            
            gain.gain.setValueAtTime(0.2, now + (index * 0.08));
            gain.gain.linearRampToValueAtTime(0, now + (index * 0.08) + 0.15);
            
            osc.start(now + (index * 0.08));
            osc.stop(now + (index * 0.08) + 0.15);
        });
    }

    function playCrashSound() {
        initAudio();
        if (!audioCtx) return;

        let now = audioCtx.currentTime;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(180, now);
        osc.frequency.linearRampToValueAtTime(30, now + 0.6); // Sauti inashuka chini kama mlipuko

        gain.gain.setValueAtTime(0.4, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.6);

        osc.start(now);
        osc.stop(now + 0.6);
    }

    // Kusikiliza Keyboard (PC)
    window.addEventListener('keydown', (e) => keys[e.key] = true);
    window.addEventListener('keyup', (e) => keys[e.key] = false);

    // KUSIKILIZA BATANI ZA SIMU (Touch na Mouse Events)
    const leftBtn = document.getElementById('leftBtn');
    const rightBtn = document.getElementById('rightBtn');

    function setupMobileButton(button, keyName) {
        // Kwa ajili ya Simu (Touch)
        button.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudio(); // Washa mfumo wa sauti mara ya kwanza mchezaji anapogusa skrini
            keys[keyName] = true;
        });
        button.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys[keyName] = false;
        });

        // Kwa ajili ya Kompyuta (Kama mtu anataka kubonyeza kwa Mouse)
        button.addEventListener('mousedown', () => { initAudio(); keys[keyName] = true; });
        button.addEventListener('mouseup', () => keys[keyName] = false);
        button.addEventListener('mouseleave', () => keys[keyName] = false);
    }

    setupMobileButton(leftBtn, 'ArrowLeft');
    setupMobileButton(rightBtn, 'ArrowRight');

    function getEnvironmentColor() {
        if (level === 1) return '#05c46b'; // Kijani
        if (level === 2) return '#eccc68'; // Jangwa
        if (level === 3) return '#0575e6'; // Neon Usiku
        return '#706fd3'; // Volkano (Level 4+)
    }

    function spawnEnemy() {
        let maxEnemies = level >= 3 ? 5 : 4;
        let spawnRate = 0.02 + (level * 0.005);

        if (Math.random() < spawnRate && enemies.length < maxEnemies) {
            const lanes = [130, 390, 650, 910];
            const randomX = lanes[Math.floor(Math.random() * lanes.length)];
            
            if (!enemies.some(e => e.y < 400 && Math.abs(e.x - randomX) < 100)) {
                const hue = Math.random() * 360;
                enemies.push({
                    x: randomX,
                    y: -300,
                    width: 150,
                    height: 260,
                    color1: `hsl(${hue}, 85%, 45%)`,
                    color2: `hsl(${hue}, 85%, 65%)`
                });
            }
        }
    }

    function update() {
        if (isGameOver) return;

        if ((keys['ArrowLeft'] || keys['a'] || keys['A']) && player.x > 110) {
            player.x -= player.speed;
        }
        if ((keys['ArrowRight'] || keys['d'] || keys['D']) && player.x < canvas.width - player.width - 110) {
            player.x += player.speed;
        }

        roadLinesY += gameSpeed;
        if (roadLinesY >= 160) roadLinesY = 0;

        for (let i = enemies.length - 1; i >= 0; i--) {
            enemies[i].y += gameSpeed;

            if (
                player.x < enemies[i].x + enemies[i].width - 15 &&
                player.x + player.width > enemies[i].x + 15 &&
                player.y < enemies[i].y + enemies[i].height - 15 &&
                player.y + player.height > enemies[i].y + 15
            ) {
                endGame();
            }

            if (enemies[i].y > canvas.height) {
                enemies.splice(i, 1);
                score += 10;
                scoreEl.innerText = score;
                
                let targetLevel = Math.floor(score / 100) + 1;
                if (targetLevel > level) {
                    level = targetLevel;
                    levelEl.innerText = level;
                    gameSpeed += 3.5;
                    player.speed += 1.5;
                    levelUpTimer = 90;
                    playLevelUpSound(); // Inapiga sauti ya kupanda ngazi!
                }
            }
        }

        spawnEnemy();
    }

    function drawCar(car, isPlayer = false) {
        ctx.save();
        ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
        ctx.shadowBlur = 20;
        ctx.shadowOffsetY = 15;

        let gradient = ctx.createLinearGradient(car.x, car.y, car.x + car.width, car.y);
        gradient.addColorStop(0, car.color1);
        gradient.addColorStop(0.5, car.color2);
        gradient.addColorStop(1, car.color1);
        
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.roundRect(car.x, car.y, car.width, car.height, 25);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;

        ctx.fillStyle = '#2c3e50';
        ctx.beginPath();
        ctx.roundRect(car.x + 18, car.y + 50, car.width - 36, 45, 10);
        ctx.fill();

        ctx.fillStyle = '#1e272e';
        ctx.fillRect(car.x - 12, car.y + 40, 12, 50);
        ctx.fillRect(car.x + car.width, car.y + 40, 12, 50);
        ctx.fillRect(car.x - 12, car.y + 170, 12, 50);
        ctx.fillRect(car.x + car.width, car.y + 170, 12, 50);

        ctx.save();
        ctx.shadowColor = isPlayer ? '#fffa65' : '#ff4d4d';
        ctx.shadowBlur = 30;
        ctx.fillStyle = isPlayer ? '#fff200' : '#ff3838';
        ctx.fillRect(car.x + 15, car.y - 5, 25, 10);
        ctx.fillRect(car.x + car.width - 40, car.y - 5, 25, 10);
        ctx.restore();

        ctx.restore();
    }

    function draw() {
        ctx.fillStyle = '#1e272e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = getEnvironmentColor();
        ctx.fillRect(0, 0, 100, canvas.height);
        ctx.fillRect(canvas.width - 100, 0, 100, canvas.height);

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(90, 0, 10, canvas.height);
        ctx.fillRect(canvas.width - 100, 0, 10, canvas.height);

        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        for (let l = 1; l < 4; l++) {
            let lineX = (canvas.width / 4) * l;
            for (let i = -160; i < canvas.height; i += 160) {
                ctx.fillRect(lineX - 4, i + roadLinesY, 8, 80);
            }
        }

        drawCar(player, true);
        enemies.forEach(enemy => drawCar(enemy, false));

        if (levelUpTimer > 0) {
            ctx.save();
            ctx.fillStyle = `rgba(255, 165, 0, ${levelUpTimer / 90})`;
            ctx.font = 'bold 90px Poppins, sans-serif';
            ctx.textAlign = 'center';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.7)';
            ctx.shadowBlur = 15;
            ctx.fillText(`NGAZI YA ${level}!`, canvas.width / 2, canvas.height / 2);
            ctx.restore();
            levelUpTimer--;
        }
    }

    function gameLoop() {
        update();
        draw();
        if (!isGameOver) {
            requestAnimationFrame(gameLoop);
        }
    }

    function endGame() {
        isGameOver = true;
        playCrashSound(); // Inapiga sauti ya mlipuko/kugongana!
        
        gameStatusTitle.innerText = "MCHEZO UMEKWISHA";
        gameStatusDesc.style.display = 'none';
        
        finalScoreEl.innerText = score;
        finalLevelEl.innerText = level;
        scoreBreakdown.style.display = 'block';
        
        startBtn.innerText = "Cheza Tena";
        gameOverScreen.style.display = 'flex';
    }

    function restartGame() {
        initAudio(); // Washa audio wakati wa kubonyeza kitufe cha kuanza
        isGameOver = false;
        score = 0;
        level = 1;
        gameSpeed = 14;
        player.speed = 22;
        enemies = [];
        player.x = 525;
        levelUpTimer = 0;
        scoreEl.innerText = score;
        levelEl.innerText = level;
        gameOverScreen.style.display = 'none';
        gameLoop();
    }

    // Onyesha skrini ya kwanza ya kuanza mchezo
    gameOverScreen.style.display = 'flex';
    draw(); // Chora mandhari ya nyuma ili isikae tupu
</script>

</body>
</html>
