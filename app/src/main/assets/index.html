<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wsendy Hub</title>
    <script src="jspdf.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding-bottom: 30px; }
        .app-header { background: linear-gradient(135deg, #FFCC00 0%, #0066CC 50%, #CC3333 100%); color: white; padding: 12px; text-align: center; }
        .app-header h1 { font-size: 18px; text-shadow: 1px 1px 2px #000; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 10px; }
        .tabs { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
        .tab-btn { flex: 1; padding: 10px; background: #e2e8f0; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .tab-btn.active { background: #0066CC; color: white; }
        .app-section { display: none; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .app-section.active { display: block; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #555; }
        input[type="text"], input[type="tel"], textarea { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 6px; font-size: 14px; background: #f8fafc; }
        textarea { height: 100px; resize: none; }
        
        .btn-block { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; color: white; margin-top: 5px; }
        .btn-success { background-color: #34c759; }
        .btn-pdf { background-color: #ff9500; }
        .btn-danger { background-color: #ff3b30; }
        
        .sub-menu { display: flex; gap: 5px; background: #f1f5f9; padding: 5px; border-radius: 6px; margin-bottom: 12px; }
        .sub-btn { flex: 1; padding: 6px; border: none; background: transparent; font-size: 11px; font-weight: bold; border-radius: 4px; }
        .sub-btn.active { background: white; color: #0066CC; }
        .msg-box { border-bottom: 1px solid #eee; padding: 10px 5px; }
        .msg-number { font-weight: bold; font-size: 13px; }
        .msg-body { font-size: 12px; color: #555; }
        
        .note-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 6px; margin-bottom: 8px; position: relative; }
        .card-actions { position: absolute; right: 8px; top: 8px; display: flex; gap: 4px; }
        .action-btn { border: none; padding: 4px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; color: white; }

        /* REKEBISHO LA KAMERA: Tumeipa upana na urefu thabiti */
        #camera-view { width: 100%; height: 280px; background: #000; border-radius: 6px; display: none; object-fit: cover; }
        #scan-preview { width: 100%; max-height: 250px; object-fit: contain; border: 2px dashed #ccc; border-radius: 6px; display: none; margin-top: 10px; }
        .btn-scan { background: #007aff; color: white; padding: 10px; border: none; border-radius: 6px; flex: 1; font-weight: bold; cursor: pointer; }

        /* POPUP YA JICHO (PREVIEW MODAL) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; padding: 15px; overflow-y: auto; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; max-width: 450px; margin: 30px auto; position: relative; }
        .close-modal { position: absolute; right: 12px; top: 12px; background: #ff3b30; color: white; border: none; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="app-header"><h1>WSENDY EDITO SYSTEM</h1></div>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" id="main-sms-tab" onclick="switchTab('sms')">💬 SMS Pro</button>
            <button class="tab-btn" id="main-editor-tab" onclick="switchTab('editor')">📝 Editor</button>
            <button class="tab-btn" onclick="switchTab('scanner')">📷 Scanner</button>
            <button class="tab-btn" onclick="switchTab('archive')">📁 Hati</button>
        </div>

        <div id="section-sms" class="app-section active">
            <button class="btn-block btn-pdf" style="margin-bottom:10px; font-size:12px; padding:8px;" onclick="window.Android.wekaDefaultSmsApp()">Set as Default SMS App 🔑</button>
            <div class="sub-menu">
                <button class="sub-btn active" onclick="switchSmsTab('tuma')">Tuma</button>
                <button class="sub-btn" onclick="switchSmsTab('inbox')">Zilizoingia</button>
                <button class="sub-btn" onclick="switchSmsTab('sent')">Zilizotumwa</button>
                <button class="sub-btn" onclick="switchSmsTab('blocked')">Zilizoblokiwa</button>
            </div>
            <div id="sms-tuma" class="sms-sub-panel">
                <div class="form-group"><label>Namba:</label><input type="tel" id="sms-namba" placeholder="07..."></div>
                <div class="form-group"><label>Ujumbe:</label><textarea id="sms-ujumbe" placeholder="Andika..."></textarea></div>
                <button class="btn-block btn-success" onclick="tumaSmsSasa()">Tuma SMS Moja kwa Moja 🚀</button>
            </div>
            <div id="sms-list-container" class="sms-sub-panel" style="display: none;">
                <div id="block-manager-area" style="display: none; padding: 5px; margin-bottom: 5px;">
                    <input type="tel" id="block-new-number" placeholder="Namba..." style="width:70%; padding:5px;">
                    <button class="btn-success" style="padding:5px;" onclick="blockNumber()">Bloki</button>
                </div>
                <div id="sms-render-list" style="max-height: 300px; overflow-y: auto;"></div>
            </div>
        </div>
        <div id="section-editor" class="app-section">
            <div class="form-group"><label>Kichwa cha Hati:</label><input type="text" id="note-title" placeholder="Kichwa..."></div>
            <div class="form-group"><label>Maudhui:</label><textarea id="note-body" placeholder="Andika hapa..."></textarea></div>
            <div id="editor-image-preview" style="margin-bottom: 10px; display: none;"><img id="attached-scanned-img" src="" style="width: 100%; border-radius: 6px;"><button class="btn-block btn-danger" style="padding:4px; font-size:11px;" onclick="removeAttachedImage()">Ondoa Picha</button></div>
            <button class="btn-block btn-success" onclick="saveNote()">Hifadhi (Save)</button>
            <button class="btn-block btn-pdf" onclick="convertActiveNoteToPDF()">Convert to PDF 📄</button>
        </div>

        <div id="section-scanner" class="app-section">
            <video id="camera-view" autoplay playsinline></video><canvas id="processing-canvas" style="display: none;"></canvas>
            <div class="scanner-controls">
                <button class="btn-scan" id="start-cam-btn" onclick="openCamera()">Washa Kamera</button>
                <button class="btn-scan" id="capture-btn" onclick="captureDocument()" style="display: none; background: #34c759;">Scan Hati 📷</button>
            </div>
            <img id="scan-preview" alt="Preview"><button class="btn-block btn-success" id="use-scan-btn" onclick="attachScanToEditor()" style="display: none;">Ingiza Kwenye Editor</button>
        </div>

        <div id="section-archive" class="app-section"><div id="notes-list"></div></div>
    </div>

    <div id="jicho-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="fungaJicho()">X</button>
            <h3 id="jicho-title" style="color:#0066CC; margin-bottom:5px;"></h3>
            <p id="jicho-date" style="font-size:11px; color:#999; margin-bottom:12px;"></p>
            <p id="jicho-body" style="font-size:14px; white-space:pre-wrap; margin-bottom:15px; line-height:1.4; background:#f8fafc; padding:10px; border-radius:6px;"></p>
            <div id="jicho-image-container"></div>
        </div>
    </div>

    <script>
        let currentStream = null; let scannedImageBase64 = ""; let currentSmsFolder = "tuma";

        window.onload = function() {
            var smsTabExists = document.getElementById('main-sms-tab');
            if (!smsTabExists) { document.getElementById('main-editor-tab').click(); }
        };

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.app-section').forEach(sec => sec.classList.remove('active'));
            if(event) { event.target.classList.add('active'); }
            document.getElementById('section-' + tabName).classList.add('active');
            stopCamera();
            if (tabName === 'archive') { loadNotesList(); }
            if (tabName === 'sms' && currentSmsFolder !== 'tuma') { pakiaSmsKwenyeSkrini(currentSmsFolder); }
        }

        // function switchSmsTab(folder) {
            currentSmsFolder = folder;
            document.querySelectorAll('.sub-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('block-manager-area').style.display = (folder === 'blocked') ? 'block' : 'none';
            if (folder === 'tuma') {
                document.getElementById('sms-tuma').style.display = 'block';
                document.getElementById('sms-list-container').style.display = 'none';
            } else {
                document.getElementById('sms-tuma').style.display = 'none';
                document.getElementById('sms-list-container').style.display = 'block';
                pakiaSmsKwenyeSkrini(folder);
            }
        }
        function tumaSmsSasa() {
            var namba = document.getElementById('sms-namba').value.trim(); var ujumbe = document.getElementById('sms-ujumbe').value.trim();
            if(!namba || !ujumbe) return;
            if(window.Android && window.Android.tumaSmsMojaKwaMoja) { window.Android.tumaSmsMojaKwaMoja(namba, ujumbe); document.getElementById('sms-ujumbe').value = ""; }
        }
        function pakiaSmsKwenyeSkrini(folder) {
            const listArea = document.getElementById('sms-render-list'); listArea.innerHTML = '<p>Inapakia...</p>';
            if (!window.Android || !window.Android.pataSmsZilizopo) return;
            let blockedNumbers = JSON.parse(localStorage.getItem('wsendy_blocked')) || [];
            let fetchFolder = (folder === 'blocked') ? 'inbox' : folder;
            let smsList = JSON.parse(window.Android.pataSmsZilizopo(fetchFolder));
            if (folder === 'blocked') { smsList = smsList.filter(sms => blockedNumbers.some(b => sms.number.includes(b))); }
            else if (folder === 'inbox') { smsList = smsList.filter(sms => !blockedNumbers.some(b => sms.number.includes(b))); }
            if(smsList.length === 0) { listArea.innerHTML = `<p style="padding:10px; font-size:12px; color:#999;">Hakuna ujumbe.</p>`; return; }
            listArea.innerHTML = "";
            smsList.forEach(sms => {
                let div = document.createElement('div'); div.className = 'msg-box';
                div.innerHTML = `<div class="msg-number">${sms.number} <span style="font-size:9px;color:#999;float:right;">${sms.date}</span></div><div class="msg-body">${sms.body}</div>`;
                div.onclick = () => { document.getElementById('sms-namba').value = sms.number; switchSmsTab('tuma'); };
                listArea.appendChild(div);
            });
        }
        function blockNumber() {
            let numInput = document.getElementById('block-new-number'); let number = numInput.value.trim(); if(!number) return;
            let blocked = JSON.parse(localStorage.getItem('wsendy_blocked')) || [];
            if(!blocked.includes(number)) { blocked.push(number); localStorage.setItem('wsendy_blocked', JSON.stringify(blocked)); numInput.value = ""; pakiaSmsKwenyeSkrini('blocked'); }
        }
        // // --- SCANNER MECHANISM RESOLVED ---
        async function openCamera() {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                const video = document.getElementById('camera-view');
                video.srcObject = currentStream; 
                video.style.display = "block";
                document.getElementById('start-cam-btn').style.display = "none"; 
                document.getElementById('capture-btn').style.display = "block";
            } catch (err) { alert("Hitilafu ya Kamera: " + err.message); }
        }
        function stopCamera() { if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; } document.getElementById('camera-view').style.display = "none"; document.getElementById('start-cam-btn').style.display = "block"; document.getElementById('capture-btn').style.display = "none"; }
        function captureDocument() {
            const video = document.getElementById('camera-view'); const canvas = document.getElementById('processing-canvas'); const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight; ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height); const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) { let b = 0.34*data[i] + 0.5*data[i+1] + 0.16*data[i+2]; let f = (b > 125) ? 255 : 0; data[i]=f; data[i+1]=f; data[i+2]=f; } ctx.putImageData(imgData, 0, 0); scannedImageBase64 = canvas.toDataURL('image/jpeg');
            const preview = document.getElementById('scan-preview'); preview.src = scannedImageBase64; preview.style.display = "block"; document.getElementById('use-scan-btn').style.display = "block"; stopCamera();
        }
        function attachScanToEditor() { document.getElementById('attached-scanned-img').src = scannedImageBase64; document.getElementById('editor-image-preview').style.display = "block"; switchTab('editor'); document.getElementById('main-editor-tab').classList.add('active'); if(document.getElementById('main-sms-tab')) document.getElementById('main-sms-tab').classList.remove('active'); }
        function removeAttachedImage() { scannedImageBase64 = ""; document.getElementById('editor-image-preview').style.display = "none"; }
        
        // --- PDF GENERATOR ---
        function generatePDF(t, b, img, d) { try { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.setFont("helvetica", "bold"); doc.setFontSize(20); doc.setTextColor(0, 102, 204); doc.text(t, 14, 20); doc.line(14, 25, 196, 25); doc.setFont("helvetica", "normal"); doc.setFontSize(12); doc.text(doc.splitTextToSize(b, 180), 14, 35); if (img) { doc.addPage(); doc.text("HATI ILIYOSKANISHWA:", 14, 15); doc.addImage(img, 'JPEG', 14, 22, 182, 135); } doc.save(t.replace(/[^a-z0-9]/gi, '_').toLowerCase() + ".pdf"); } catch (e) {} }
        function convertActiveNoteToPDF() { var t = document.getElementById('note-title').value; var b = document.getElementById('note-body').value; if(!t||!b) return; generatePDF(t,b,scannedImageBase64,new Date().toLocaleDateString()); }
        
        function saveNote() {
            var t = document.getElementById('note-title').value; var b = document.getElementById('note-body').value; if(!t||!b) return;
            let notes = JSON.parse(localStorage.getItem('wsendy_notes')) || []; notes.unshift({ id: Date.now(), title: t, body: b, image: scannedImageBase64, date: new Date().toLocaleDateString() }); localStorage.setItem('wsendy_notes', JSON.stringify(notes));
            document.getElementById('note-title').value = ""; document.getElementById('note-body').value = ""; removeAttachedImage(); alert("Imehifadhiwa!"); switchTab('archive');
        }

        // --- ARCHIVE WITH "JICHO" (PREVIEW) FUNCTION ---
        function loadNotesList() {
            const container = document.getElementById('notes-list'); let notes = JSON.parse(localStorage.getItem('wsendy_notes')) || []; if(notes.length===0) { container.innerHTML='<p style="text-align:center;color:#999;font-size:12px;">Hakuna hati.</p>'; return; }
            container.innerHTML = ""; 
            notes.forEach(n => { 
                let card = document.createElement('div'); card.className = 'note-card'; 
                
                // Salama ya ku-escape single quotes kwenye kodi za PDF button
                let safeTitle = n.title.replace(/'/g, "\\'");
                let safeBody = n.body.replace(/'/g, "\\'").replace(/\n/g, " ");

                card.innerHTML = `
                    <div class="card-actions">
                        <button class="action-btn" style="background:#00c2ff;" onclick="event.stopPropagation(); funguaJicho(${n.id})">👁️ Jicho</button>
                        <button class="action-btn" style="background:#ff9500;" onclick="event.stopPropagation(); generatePDF('${safeTitle}', '${safeBody}', '${n.image || ""}', '${n.date}')">PDF 📄</button>
                        <button class="action-btn" style="background:#ff3b30;" onclick="event.stopPropagation(); deleteNote(${n.id})">Futa</button>
                    </div>
                    <h4 style="font-size:14px; padding-right:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${n.title}</h4>
                    <p style="font-size:10px; color:#666; margin-bottom:4px;">${n.date}</p>
                    <p style="font-size:12px; color:#555; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden; padding-right:150px;">${n.body}</p>
                `; 
                container.appendChild(card); 
            });
        }

        // KAZI ZA POPUP YA JICHO
        function funguaJicho(id) {
            let notes = JSON.parse(localStorage.getItem('wsendy_notes')) || [];
            let note = notes.find(n => n.id === id);
            if(!note) return;

            document.getElementById('jicho-title').innerText = note.title;
            document.getElementById('jicho-date').innerText = "Tarehe: " + note.date;
            document.getElementById('jicho-body').innerText = note.body;
            
            let imgContainer = document.getElementById('jicho-image-container');
            if(note.image) {
                imgContainer.innerHTML = `<label style="font-size:11px; font-weight:bold; color:#333; display:block; margin-top:10px;">Hati Iliyoskaniwa (Document):</label><img src="${note.image}" style="width:100%; border-radius:6px; border:1px solid #ddd; margin-top:5px;">`;
            } else {
                imgContainer.innerHTML = "";
            }
            
            document.getElementById('jicho-modal').style.display = "block";
        }
        function fungaJicho() { document.getElementById('jicho-modal').style.display = "none"; }
        function deleteNote(id) { if(confirm("Futa?")) { let notes = JSON.parse(localStorage.getItem('wsendy_notes')) || []; localStorage.setItem('wsendy_notes', JSON.stringify(notes.filter(n => n.id !== id))); loadNotesList(); } }
    </script>
</body>
</html>
